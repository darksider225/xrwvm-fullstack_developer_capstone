apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: dealership
  name: dealership
spec:
  replicas: 1
  selector:
    matchLabels:
      run: dealership
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        run: dealership
    spec:
      containers:
        - name: dealership
          image: us.icr.io/sn-labs-abhayrangari/dealership:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP

          env:
            - name: backend_url
              value: "https://abhayrangari-3030.theiadockernext-1-labs-prod-theiak8s-4-tor01.proxy.cognitiveclass.ai"

            - name: sentiment_analyzer_url
              value: "https://sentianalyzer.28lcwxebch6m.us-south.codeengine.appdomain.cloud/"

      restartPolicy: Always